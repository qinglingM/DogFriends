<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>上传图片 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .step-indicator { font-weight: 800; color: var(--text-light); font-size: 14px; }

      .progress-bar { height: 8px; background-color: var(--border-color); margin: 0 16px 24px; border-radius: 4px; overflow: hidden; }
      .progress-inner { height: 100%; width: 100%; background-color: var(--primary-color); border-radius: 4px; }

      .form-container { padding: 0 16px 104px; }
      .form-group { margin-bottom: 24px; }
      .form-label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 16px; }
      .form-label span { color: #E74C3C; }
      
      .form-textarea {
        width: 100%; background-color: var(--white); border: 2px solid transparent;
        padding: 16px; border-radius: 16px; font-size: 16px; color: var(--text-main);
        outline: none; resize: none; height: 104px; font-family: inherit;
      }
      .form-textarea:focus { border-color: var(--primary-color); }

      .image-upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }
      .upload-box {
        aspect-ratio: 1; background-color: var(--white); border: 2px dashed var(--border-color);
        border-radius: 16px; display: flex; flex-direction: column; align-items: center;
        justify-content: center; color: var(--text-light); gap: 8px; cursor: pointer;
      }
      .upload-box i { font-size: 24px; }
      .uploaded-img {
        aspect-ratio: 1; background-color: #D3E0C8; border-radius: 16px; position: relative;
        display: flex; align-items: center; justify-content: center; overflow: hidden;
      }
      .delete-btn {
        position: absolute; top: -8px; right: -8px; background-color: #E74C3C; color: white;
        border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center;
        justify-content: center; font-size: 12px;
      }

      .toggle-row {
        display: flex; justify-content: space-between; align-items: center;
        background-color: var(--white); padding: 16px; border-radius: 16px; font-weight: 700;
      }
      .toggle-switch {
        width: 48px; height: 24px; background-color: var(--primary-color);
        border-radius: 12px; position: relative;
      }
      .toggle-knob {
        width: 20px; height: 20px; background-color: white; border-radius: 50%;
        position: absolute; top: 2px; right: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      }

      .bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
        padding: 16px; background-color: var(--bg-color); border-top: 1px solid var(--border-color);
        display: flex; gap: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/add_rules.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">新增地点 · 照片</div>
        <div class="nav-actions right">
          <div class="step-indicator">3/3</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-inner"></div></div>

      <div class="form-container">
        
        <div class="form-group">
          <label class="form-label">补充说明 (选填)</label>
          <textarea class="form-textarea" placeholder="分享一些你对这个地方的真实体验吧～"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">上传图片 <span>*</span></label>
          <div style="font-size: 12px; color: var(--text-light); line-height: 1.5;">上传门口 / 环境 / 宠物友好标识等照片，帮助大家更好判断。至少上传 1 张。</div>
          <div class="image-upload-grid">
            <div class="uploaded-img">
              <i class="ph-bold ph-image" style="font-size: 32px; color: var(--secondary-color); opacity: 0.5;"></i>
              <div class="delete-btn"><i class="ph-bold ph-x"></i></div>
            </div>
            <div class="upload-box">
              <i class="ph-bold ph-plus"></i>
              <span style="font-size: 12px;">照片</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <div class="toggle-row">
            <span>愿意接收审核结果通知</span>
            <div class="toggle-switch"><div class="toggle-knob"></div></div>
          </div>
        </div>

      </div>

      <div class="bottom-bar">
        <a href="/add_success.html" class="btn btn-primary" style="width: 100%;">提交审核</a>
      </div>
    </div>
  </body>
</html>
