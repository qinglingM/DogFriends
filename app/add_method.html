<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>新增地点 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .content {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 24px; /* 8pt */
        align-items: center;
      }
      .main-title {
        font-size: 24px;
        text-align: center;
        width: 100%;
      }
      .option-card {
        background-color: var(--white);
        border-radius: 24px; /* Maintain chunky playful feel */
        padding: 32px 16px; /* 8pt */
        width: 100%;
        text-align: center;
        text-decoration: none;
        color: inherit;
        border: 2px solid transparent;
        transition: border-color 0.2s;
      }
      .option-card:active {
        border-color: var(--primary-color);
      }
      .option-icon {
        font-size: 64px;
        color: var(--secondary-color);
        margin-bottom: 16px;
      }
      .option-title {
        font-size: 20px;
        margin-bottom: 8px;
      }
      .option-desc {
        color: var(--text-light);
        font-size: 14px;
      }
      
      .tip-box {
        background-color: rgba(52, 112, 72, 0.05);
        border-radius: 16px;
        padding: 16px;
        text-align: center;
        margin-top: auto;
        margin-bottom: 48px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="app-container" style="min-height: 100vh; display: flex; flex-direction: column;">
      
      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/index.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">新增宠物友好地点</div>
      </div>

      <div class="content" style="flex: 1;">
        <h2 class="main-title">你想如何新增？</h2>
        
        <a href="/add_basic.html" class="option-card">
          <div class="option-icon"><i class="ph-fill ph-map-pin-line"></i></div>
          <h3 class="option-title">我知道一个地方</h3>
          <div class="option-desc">我去过这里，确认它宠物友好，填写信息提交</div>
        </a>

        <a href="/add_basic.html" class="option-card">
          <div class="option-icon"><i class="ph-fill ph-sparkle"></i></div>
          <h3 class="option-title">我发现了一个新地方</h3>
          <div class="option-desc">这个地方还没有被收录，帮大家一起完善</div>
        </a>

        <div class="spacer"></div>

        <div class="tip-box">
          <div style="font-weight: 800; color: var(--secondary-color); margin-bottom: 8px;">温馨提示</div>
          <div style="color: var(--text-light); font-size: 12px; line-height: 1.6;">请确保信息真实，帮助更多狗狗主人。<br>提交后需要平台审核，审核通过后才会展示。</div>
        </div>
      </div>

    </div>
  </body>
</html>
