<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>提交成功 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .success-container {
        display: flex; flex-direction: column; align-items: center;
        padding: 48px 16px; text-align: center; flex-grow: 1;
      }
      .illustration {
        width: 200px; height: 200px; background-color: var(--primary-color);
        border-radius: 50%; margin: 48px 0; display: flex; align-items: center;
        justify-content: center; position: relative;
      }
      /* Placeholder for dog illustration */
      .illustration-inner { font-size: 80px; color: var(--secondary-color); }
      .sparkle-1 { position: absolute; top: 8px; right: 24px; font-size: 24px; color: var(--accent-color); }
      .sparkle-2 { position: absolute; bottom: 24px; left: 8px; font-size: 32px; color: var(--white); }

      h1 { font-size: 32px; margin-bottom: 8px; }
      p { color: var(--text-light); margin-bottom: 32px; font-size: 16px; }

      .info-card {
        background-color: var(--white); border-radius: 16px; padding: 16px;
        width: 100%; margin-bottom: 48px; text-align: left; display: flex; gap: 16px;
      }
      .info-card i { font-size: 24px; color: var(--accent-color); }

      .action-buttons { width: 100%; display: flex; flex-direction: column; gap: 16px; }
    </style>
  </head>
  <body>
    <div class="app-container" style="min-height: 100vh;">
      <div class="nav-bar" style="background-color: transparent; border-bottom: none;">
        <div class="nav-actions left">
          <a href="/index.html" style="display:flex;"><i class="ph-bold ph-x"></i></a>
        </div>
      </div>

      <div class="success-container">
        
        <div class="illustration">
          <div class="illustration-inner"><i class="ph-fill ph-dog"></i></div>
          <i class="ph-fill ph-sparkle sparkle-1"></i>
          <i class="ph-fill ph-sparkle sparkle-2"></i>
        </div>

        <h1>提交成功！</h1>
        <p>感谢你的分享，我们会尽快审核</p>

        <div class="info-card">
          <i class="ph-fill ph-info"></i>
          <div style="font-size: 14px; color: var(--text-light); line-height: 1.5;">
            <div style="color: var(--secondary-color); font-weight: 800; margin-bottom: 8px; font-size: 16px;">预计审核时间：1-3 个工作日</div>
            审核结果会通过消息通知你，真实有效的信息会帮助到更多狗狗主人。
          </div>
        </div>

        <div class="action-buttons">
          <a href="/index.html" class="btn btn-primary">继续探索去玩</a>
          <a href="/history.html" class="btn btn-secondary">查看我的提交</a>
        </div>
      </div>
    </div>
  </body>
</html>
