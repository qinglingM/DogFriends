<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>编辑狗狗 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .edit-page {
        padding-bottom: 104px;
      }

      .avatar-upload {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px;
        gap: 8px;
      }

      .avatar-circle {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background-color: var(--white);
        border: 3px dashed var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: var(--border-color);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: border-color 0.2s;
      }

      .avatar-circle:active {
        border-color: var(--primary-color);
      }

      .avatar-circle.has-photo {
        border-style: solid;
        border-color: var(--primary-color);
      }

      .avatar-badge {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 32px;
        height: 32px;
        background-color: var(--primary-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: var(--secondary-color);
        border: 2px solid var(--bg-color);
      }

      .avatar-hint {
        font-size: 12px;
        color: var(--text-light);
      }

      .form-area {
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-label {
        display: block;
        font-weight: 800;
        font-size: 16px;
        color: var(--secondary-color);
      }

      .form-label span {
        color: #E74C3C;
      }

      .form-input {
        width: 100%;
        background-color: var(--white);
        border: 2px solid transparent;
        padding: 16px;
        border-radius: 16px;
        font-size: 16px;
        color: var(--text-main);
        outline: none;
        transition: border-color 0.2s;
        font-family: inherit;
      }

      .form-input:focus {
        border-color: var(--primary-color);
      }

      .form-input::placeholder {
        color: #A0B3A2;
      }

      .form-select {
        width: 100%;
        background-color: var(--white);
        border: 2px solid transparent;
        padding: 16px;
        border-radius: 16px;
        font-size: 16px;
        color: var(--text-main);
        outline: none;
        font-family: inherit;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }

      .form-select:active {
        border-color: var(--primary-color);
      }

      .form-select .placeholder {
        color: #A0B3A2;
      }

      .gender-selector {
        display: flex;
        gap: 16px;
      }

      .gender-btn {
        flex: 1;
        background-color: var(--white);
        border: 2px solid transparent;
        border-radius: 16px;
        padding: 16px;
        text-align: center;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
        min-height: 72px;
      }

      .gender-btn .gender-icon {
        font-size: 28px;
      }

      .gender-btn .gender-label {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-light);
      }

      .gender-btn.active {
        border-color: var(--primary-color);
        background-color: rgba(185, 207, 50, 0.1);
      }

      .gender-btn.active .gender-label {
        color: var(--secondary-color);
        font-weight: 800;
      }

      .weight-input {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .weight-input .form-input {
        flex: 1;
        text-align: center;
      }

      .weight-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background-color: var(--white);
        border: 2px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--secondary-color);
        cursor: pointer;
        flex-shrink: 0;
      }

      .weight-btn:active {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
      }

      .weight-unit {
        font-size: 16px;
        font-weight: 800;
        color: var(--secondary-color);
        flex-shrink: 0;
      }

      .advanced-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: var(--white);
        border-radius: 16px;
        padding: 16px;
        cursor: pointer;
      }

      .advanced-toggle .toggle-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .advanced-toggle .toggle-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .advanced-toggle .toggle-icon.green {
        background-color: rgba(185, 207, 50, 0.2);
        color: var(--secondary-color);
      }

      .advanced-toggle .toggle-text {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
      }

      .toggle-switch {
        width: 48px;
        height: 28px;
        background-color: var(--primary-color);
        border-radius: 14px;
        position: relative;
        cursor: pointer;
      }

      .toggle-switch.off {
        background-color: var(--border-color);
      }

      .toggle-knob {
        width: 24px;
        height: 24px;
        background-color: white;
        border-radius: 50%;
        position: absolute;
        top: 2px;
        right: 2px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        transition: right 0.2s;
      }

      .toggle-switch.off .toggle-knob {
        right: calc(100% - 26px);
      }

      .vaccine-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: var(--white);
        border-radius: 16px;
        padding: 16px;
        text-decoration: none;
        color: inherit;
      }

      .vaccine-link:active {
        background-color: var(--bg-color);
      }

      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px;
        background-color: var(--bg-color);
        border-top: 1px solid var(--border-color);
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="app-container">

      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/dog_profile.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">编辑狗狗</div>
      </div>

      <div class="edit-page">

        <div class="avatar-upload">
          <div class="avatar-circle">
            <i class="ph-bold ph-camera"></i>
            <div class="avatar-badge">
              <i class="ph-bold ph-pencil-simple"></i>
            </div>
          </div>
          <span class="avatar-hint">点击上传狗狗头像</span>
        </div>

        <div class="form-area">

          <div class="form-group">
            <label class="form-label">名字 <span>*</span></label>
            <input type="text" class="form-input" placeholder="给狗狗起个名字" value="旺财" />
          </div>

          <div class="form-group">
            <label class="form-label">品种 <span>*</span></label>
            <div class="form-select">
              <span>金毛寻回犬</span>
              <i class="ph-bold ph-caret-down" style="color: var(--text-light);"></i>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">性别 <span>*</span></label>
            <div class="gender-selector">
              <div class="gender-btn active">
                <span class="gender-icon">♂</span>
                <span class="gender-label">公</span>
              </div>
              <div class="gender-btn">
                <span class="gender-icon">♀</span>
                <span class="gender-label">母</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">生日 <span>*</span></label>
            <div class="form-select">
              <span>2023-03-15</span>
              <i class="ph-bold ph-calendar" style="color: var(--text-light);"></i>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">体重 <span>*</span></label>
            <div class="weight-input">
              <div class="weight-btn">
                <i class="ph-bold ph-minus"></i>
              </div>
              <input type="text" class="form-input" value="32" style="font-weight: 800; font-size: 24px;" />
              <span class="weight-unit">kg</span>
              <div class="weight-btn">
                <i class="ph-bold ph-plus"></i>
              </div>
            </div>
          </div>

          <div style="height: 1px; background-color: var(--border-color); margin: 8px 0;"></div>

          <div class="form-group">
            <label class="form-label" style="color: var(--accent-color);">进阶信息</label>

            <div class="advanced-toggle">
              <div class="toggle-left">
                <div class="toggle-icon green">
                  <i class="ph-bold ph-scissors"></i>
                </div>
                <span class="toggle-text">已绝育</span>
              </div>
              <div class="toggle-switch">
                <div class="toggle-knob"></div>
              </div>
            </div>
          </div>

          <a href="/vaccine.html" class="vaccine-link">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="toggle-icon" style="background-color: rgba(146, 102, 153, 0.15); color: var(--accent-color); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                <i class="ph-bold ph-syringe"></i>
              </div>
              <div>
                <div style="font-size: 16px; font-weight: 700; color: var(--text-main);">疫苗记录</div>
                <div style="font-size: 12px; color: var(--text-light);">已接种 3 项</div>
              </div>
            </div>
            <i class="ph-bold ph-caret-right" style="color: var(--text-light);"></i>
          </a>

        </div>

      </div>

      <div class="bottom-bar">
        <a href="/dog_profile.html" class="btn btn-primary">保存</a>
      </div>

    </div>

    <script>
      document.querySelectorAll('.gender-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.gender-btn').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
        });
      });

      document.querySelector('.toggle-switch').addEventListener('click', function() {
        this.classList.toggle('off');
      });
    </script>

  </body>
</html>
