<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>去玩 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      /* Home Page Specific Styles conforming to 8pt Grid */

      /* Search Section (Inline City and Search) */
      .search-section {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
      }
      .city-selector {
        font-weight: 800;
        color: var(--secondary-color);
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 16px; /* Reduced to fit inline */
        flex-shrink: 0;
      }
      .search-bar {
        flex: 1;
        background-color: var(--white);
        border-radius: 999px;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-light);
        font-size: 14px;
        min-width: 0; /* Ensures text truncation works */
      }
      .add-icon-btn {
        width: 40px;
        height: 40px;
        background-color: var(--primary-color);
        color: var(--secondary-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }

      /* Categories */
      .categories {
        display: flex;
        justify-content: space-between;
        padding: 16px;
      }
      .cat-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px; /* standard 8px gap */
      }
      .cat-icon-box {
        width: 56px; /* Multiple of 8 (8x7) */
        height: 56px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        border: 2px solid var(--secondary-color);
      }
      .cat-item.active .cat-icon-box {
        background-color: var(--primary-color);
      }
      .cat-item.active span {
        font-weight: 800;
        color: var(--secondary-color);
      }

      /* Filter Chips Scroll */
      .filter-scroll {
        display: flex;
        gap: 8px; /* 8px gap between chips */
        padding: 0 16px 16px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .filter-scroll::-webkit-scrollbar { display: none; }

      /* Location List */
      .location-list {
        padding: 0 16px 24px; /* Removed 104px padding since FAB is gone */
      }
      
      .loc-card {
        display: flex;
        flex-direction: column;
        gap: 8px; /* Consistent 8px gap */
        position: relative;
        text-decoration: none;
        color: inherit;
      }
      .loc-image {
        height: 160px; /* Multiple of 8 (8x20) */
        border-radius: 8px;
        overflow: hidden;
      }
      .loc-info h3 {
        font-size: 18px;
        margin-bottom: 8px; /* Consistent 8px gap */
        padding-right: 32px; /* Space for bookmark icon */
      }
      .loc-subtitle {
        font-size: 12px;
        color: var(--text-light);
        margin-bottom: 8px;
      }
      .loc-tags {
        display: flex;
        gap: 8px; /* Standard 8px gap */
        flex-wrap: wrap;
      }
      .bookmark-btn {
        position: absolute;
        top: 176px; /* Image (160) + Card Padding (16) */
        right: 16px; /* Right card padding */
        font-size: 24px;
        color: var(--secondary-color);
      }

      /* Floating Action Button */
      .fab-container {
        position: fixed;
        bottom: 104px; /* Safely above the bottom tab */
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        padding: 0 16px;
        z-index: 9;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      
      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-title">去玩</div>
        <div class="nav-actions right">
          <a href="/history.html" style="display:flex;"><i class="ph-bold ph-clock-counter-clockwise"></i></a>
        </div>
      </div>

      <div class="search-section">
        <div class="city-selector">
          上海 <i class="ph-bold ph-caret-down"></i>
        </div>
        <div class="search-bar">
          <i class="ph-bold ph-magnifying-glass" style="font-size: 18px;"></i>
          <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">搜索地点或咖啡店...</span>
        </div>
        <a href="/add_method.html" class="add-icon-btn">
          <i class="ph-bold ph-plus"></i>
        </a>
      </div>

      <div class="categories">
        <div class="cat-item active">
          <div class="cat-icon-box"><i class="ph-fill ph-paw-print"></i></div>
          <span>全部</span>
        </div>
        <div class="cat-item">
          <div class="cat-icon-box"><i class="ph-fill ph-tree"></i></div>
          <span>公园</span>
        </div>
        <div class="cat-item">
          <div class="cat-icon-box"><i class="ph-fill ph-coffee"></i></div>
          <span>咖啡</span>
        </div>
        <div class="cat-item">
          <div class="cat-icon-box"><i class="ph-fill ph-fork-knife"></i></div>
          <span>餐厅</span>
        </div>
      </div>

      <div class="filter-scroll">
        <div class="chip chip-active">已验证</div>
        <div class="chip chip-default">室内可进</div>
        <div class="chip chip-default">室外友好</div>
        <div class="chip chip-default">大型犬友好</div>
      </div>

      <div class="location-list">
        <!-- Card 1 -->
        <a href="/detail.html" class="card loc-card">
          <div class="loc-image">
            <div class="placeholder-img" style="background-color: #D3E0C8;">
              <i class="ph-bold ph-coffee" style="font-size: 48px; color: var(--secondary-color); opacity: 0.5;"></i>
            </div>
          </div>
          <div class="loc-info">
            <h3>BLOOM Coffee</h3>
            <div class="loc-subtitle">咖啡店 · 徐汇区 · 1.8km</div>
            <div class="chip chip-verified" style="margin-bottom: 8px;">已验证可带狗</div>
            <div style="font-size: 12px; color: var(--text-light); margin-bottom: 8px;">2 天前有用户去过</div>
            <div class="loc-tags">
              <span class="chip chip-default">仅户外</span>
              <span class="chip chip-default">小型犬友好</span>
              <span class="chip chip-default">有水碗</span>
            </div>
          </div>
          <i class="ph-bold ph-bookmark-simple bookmark-btn"></i>
        </a>

        <!-- Card 2 -->
        <a href="/detail.html" class="card loc-card">
          <div class="loc-image">
            <div class="placeholder-img" style="background-color: #E6D8F0;">
               <i class="ph-bold ph-tree" style="font-size: 48px; color: var(--accent-color); opacity: 0.5;"></i>
            </div>
          </div>
          <div class="loc-info">
            <h3>复兴公园</h3>
            <div class="loc-subtitle">公园 · 黄浦区 · 3.2km</div>
            <div class="chip chip-verified" style="margin-bottom: 8px; background-color: var(--accent-color); color: white;">大型犬友好</div>
            <div style="font-size: 12px; color: var(--text-light); margin-bottom: 8px;">今天有用户去过</div>
            <div class="loc-tags">
              <span class="chip chip-default">室外可进</span>
              <span class="chip chip-default">需要牵绳</span>
            </div>
          </div>
          <i class="ph-bold ph-bookmark-simple bookmark-btn"></i>
        </a>
      </div>

      <div class="bottom-tab">
        <div class="tab-item">
          <i class="ph-bold ph-map-pin-line"></i>
          <span>遛狗</span>
        </div>
        <div class="tab-item active">
          <i class="ph-fill ph-paw-print"></i>
          <span>去玩</span>
        </div>
        <div class="tab-item">
          <i class="ph-bold ph-user"></i>
          <span>我的</span>
        </div>
      </div>

    </div>
  </body>
</html>
