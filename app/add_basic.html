<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>填写基本信息 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .step-indicator { font-weight: 800; color: var(--text-light); font-size: 14px; }

      .progress-bar { height: 8px; background-color: var(--border-color); margin: 0 16px 24px; border-radius: 4px; overflow: hidden; }
      .progress-inner { height: 100%; width: 33.33%; background-color: var(--primary-color); border-radius: 4px; }

      .form-container { padding: 0 16px 104px; }
      
      .form-group { margin-bottom: 24px; }
      .form-label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 16px; }
      .form-label span { color: #E74C3C; }
      
      .form-input {
        width: 100%; background-color: var(--white); border: 2px solid transparent;
        padding: 16px; border-radius: 16px; font-size: 16px; color: var(--text-main);
        outline: none; transition: border-color 0.2s; font-family: inherit;
      }
      .form-input:focus { border-color: var(--primary-color); }
      .form-input::placeholder { color: #A0B3A2; }

      .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .type-item {
        background-color: var(--white); border: 2px solid transparent; border-radius: 16px;
        padding: 16px 8px; text-align: center; cursor: pointer;
      }
      .type-item.active { background-color: var(--primary-color); border-color: var(--secondary-color); font-weight: 800; color: var(--secondary-color); }
      .type-icon { font-size: 24px; margin-bottom: 8px; }

      .map-selector {
        background-color: var(--white); border-radius: 16px; padding: 16px; display: flex;
        align-items: center; justify-content: center; gap: 8px; color: var(--secondary-color);
        font-weight: 800; border: 2px dashed var(--border-color);
      }

      .bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
        padding: 16px; background-color: var(--bg-color); border-top: 1px solid var(--border-color);
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      
      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/add_method.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">新增地点 · 基本信息</div>
        <div class="nav-actions right">
          <div class="step-indicator">1/3</div>
        </div>
      </div>

      <div class="progress-bar"><div class="progress-inner"></div></div>

      <div class="form-container">
        
        <div class="form-group">
          <label class="form-label">地点名称 <span>*</span></label>
          <input type="text" class="form-input" placeholder="请输入地点名称" />
        </div>

        <div class="form-group">
          <label class="form-label">地点类型 <span>*</span></label>
          <div class="type-grid">
            <div class="type-item active">
              <div class="type-icon"><i class="ph-fill ph-tree"></i></div>
              <div>公园</div>
            </div>
            <div class="type-item">
              <div class="type-icon"><i class="ph-fill ph-coffee"></i></div>
              <div>咖啡</div>
            </div>
            <div class="type-item">
              <div class="type-icon"><i class="ph-fill ph-fork-knife"></i></div>
              <div>餐厅</div>
            </div>
            <div class="type-item">
              <div class="type-icon"><i class="ph-fill ph-storefront"></i></div>
              <div>商场</div>
            </div>
            <div class="type-item">
              <div class="type-icon"><i class="ph-fill ph-dots-three-circle"></i></div>
              <div>其他</div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">所在城市 <span>*</span></label>
          <div class="form-input" style="display: flex; justify-content: space-between;">
            <span>上海</span> <i class="ph-bold ph-caret-right"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">所在区域 <span>*</span></label>
          <div class="form-input" style="display: flex; justify-content: space-between; color: #A0B3A2;">
            <span>请选择区域</span> <i class="ph-bold ph-caret-right"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">详细地址 <span>*</span></label>
          <input type="text" class="form-input" placeholder="请输入详细地址，例如：某某路 123 号" />
        </div>

        <div class="form-group">
          <label class="form-label">地图位置 (建议)</label>
          <div class="map-selector">
            <i class="ph-bold ph-map-pin"></i> 在地图上选位置
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">联系电话 (选填)</label>
          <input type="tel" class="form-input" placeholder="请输入联系电话" />
        </div>

        <div class="form-group">
          <label class="form-label">营业时间 (选填)</label>
          <input type="text" class="form-input" placeholder="例如：10:00 - 22:00" />
        </div>

      </div>

      <div class="bottom-bar">
        <a href="/add_rules.html" class="btn btn-primary">下一步</a>
      </div>

    </div>
  </body>
</html>
