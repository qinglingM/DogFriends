<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>旺财 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .dog-page {
        padding-bottom: 104px;
      }

      .dog-hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px 24px;
        gap: 8px;
      }

      .dog-hero .dog-avatar {
        width: 96px;
        height: 96px;
        font-size: 48px;
        border-width: 3px;
        border-color: var(--primary-color);
      }

      .dog-hero .hero-name {
        font-size: 24px;
        font-weight: 800;
        color: var(--secondary-color);
        margin-top: 8px;
      }

      .dog-hero .hero-breed {
        font-size: 14px;
        color: var(--text-light);
      }

      .dog-hero .hero-tags {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .info-section {
        padding: 0 16px;
        margin-bottom: 24px;
      }

      .info-card {
        background-color: var(--white);
        border-radius: 16px;
        padding: 16px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-color);
      }

      .info-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .info-row:first-child {
        padding-top: 0;
      }

      .info-label {
        font-size: 14px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .info-label i {
        font-size: 16px;
        color: var(--primary-color);
      }

      .info-value {
        font-size: 14px;
        font-weight: 700;
        color: var(--secondary-color);
      }

      .dog-stats-card {
        background-color: var(--white);
        border-radius: 16px;
        padding: 16px;
      }

      .stats-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 16px;
        border-bottom: 1px solid var(--border-color);
      }

      .stats-tab {
        flex: 1;
        text-align: center;
        padding: 12px 0;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-light);
        position: relative;
        cursor: pointer;
      }

      .stats-tab.active {
        color: var(--secondary-color);
      }

      .stats-tab.active::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 25%;
        right: 25%;
        height: 3px;
        background-color: var(--primary-color);
        border-radius: 3px 3px 0 0;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .stat-box {
        text-align: center;
        padding: 16px 8px;
        background-color: var(--bg-color);
        border-radius: 16px;
      }

      .stat-box .sb-value {
        font-size: 24px;
        font-weight: 800;
        color: var(--secondary-color);
      }

      .stat-box .sb-unit {
        font-size: 12px;
        font-weight: 700;
        color: var(--secondary-color);
      }

      .stat-box .sb-label {
        font-size: 12px;
        color: var(--text-light);
        margin-top: 4px;
      }

      .advanced-section {
        padding: 0 16px;
        margin-bottom: 24px;
      }

      .advanced-card {
        background-color: var(--white);
        border-radius: 16px;
        overflow: hidden;
      }

      .advanced-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        border-bottom: 1px solid var(--border-color);
        text-decoration: none;
        color: inherit;
        min-height: 56px;
      }

      .advanced-item:last-child {
        border-bottom: none;
      }

      .advanced-item:active {
        background-color: var(--bg-color);
      }

      .advanced-item .adv-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }

      .advanced-item .adv-icon.purple {
        background-color: rgba(146, 102, 153, 0.15);
        color: var(--accent-color);
      }

      .advanced-item .adv-icon.green {
        background-color: rgba(185, 207, 50, 0.2);
        color: var(--secondary-color);
      }

      .advanced-item .adv-text {
        flex: 1;
      }

      .advanced-item .adv-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
      }

      .advanced-item .adv-sub {
        font-size: 12px;
        color: var(--text-light);
        margin-top: 2px;
      }

      .advanced-item .adv-arrow {
        font-size: 16px;
        color: var(--text-light);
      }

      .edit-fab {
        position: fixed;
        bottom: 104px;
        right: calc((100vw - 480px) / 2 + 16px);
        width: 56px;
        height: 56px;
        background-color: var(--primary-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--secondary-color);
        border-bottom: 3px solid var(--secondary-color);
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.15);
        z-index: 9;
        text-decoration: none;
      }

      @media (max-width: 480px) {
        .edit-fab {
          right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">

      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/profile.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">狗狗档案</div>
        <div class="nav-actions right">
          <a href="/dog_edit.html" style="display:flex;"><i class="ph-bold ph-pencil-simple"></i></a>
        </div>
      </div>

      <div class="dog-page">

        <div class="dog-hero">
          <div class="dog-avatar">
            <i class="ph-fill ph-dog"></i>
          </div>
          <span class="hero-name">旺财</span>
          <span class="hero-breed">金毛寻回犬 · ♂ 公</span>
          <div class="hero-tags">
            <span class="chip chip-verified">大型犬</span>
            <span class="chip chip-default">3 岁</span>
            <span class="chip chip-default">32 kg</span>
          </div>
        </div>

        <div class="info-section">
          <div class="section-header" style="padding: 0; margin-bottom: 16px;">
            <h3>基本信息</h3>
          </div>
          <div class="info-card">
            <div class="info-row">
              <span class="info-label"><i class="ph-bold ph-dog"></i> 品种</span>
              <span class="info-value">金毛寻回犬</span>
            </div>
            <div class="info-row">
              <span class="info-label"><i class="ph-bold ph-gender-intersex"></i> 性别</span>
              <span class="info-value">♂ 公</span>
            </div>
            <div class="info-row">
              <span class="info-label"><i class="ph-bold ph-calendar"></i> 生日</span>
              <span class="info-value">2023-03-15 (3岁)</span>
            </div>
            <div class="info-row">
              <span class="info-label"><i class="ph-bold ph-scales"></i> 体重</span>
              <span class="info-value">32 kg</span>
            </div>
          </div>
        </div>

        <div class="info-section">
          <div class="section-header" style="padding: 0; margin-bottom: 16px;">
            <h3>遛狗统计</h3>
          </div>
          <div class="dog-stats-card">
            <div class="stats-tabs">
              <div class="stats-tab active">本周</div>
              <div class="stats-tab">本月</div>
              <div class="stats-tab">累计</div>
            </div>
            <div class="stats-grid">
              <div class="stat-box">
                <div>
                  <span class="sb-value">5</span>
                  <span class="sb-unit"> 次</span>
                </div>
                <span class="sb-label">遛狗次数</span>
              </div>
              <div class="stat-box">
                <div>
                  <span class="sb-value">12.6</span>
                  <span class="sb-unit"> km</span>
                </div>
                <span class="sb-label">总距离</span>
              </div>
              <div class="stat-box">
                <div>
                  <span class="sb-value">3.5</span>
                  <span class="sb-unit"> h</span>
                </div>
                <span class="sb-label">总时长</span>
              </div>
              <div class="stat-box">
                <div>
                  <span class="sb-value">4.2</span>
                  <span class="sb-unit"> km/h</span>
                </div>
                <span class="sb-label">平均配速</span>
              </div>
            </div>
          </div>
        </div>

        <div class="advanced-section">
          <div class="section-header" style="padding: 0; margin-bottom: 16px;">
            <h3>进阶信息</h3>
          </div>
          <div class="advanced-card">
            <a href="/vaccine.html" class="advanced-item">
              <div class="adv-icon purple">
                <i class="ph-bold ph-syringe"></i>
              </div>
              <div class="adv-text">
                <div class="adv-title">疫苗记录</div>
                <div class="adv-sub">已接种 3 项 · 下次提醒 2026-09-15</div>
              </div>
              <i class="ph-bold ph-caret-right adv-arrow"></i>
            </a>
            <div class="advanced-item">
              <div class="adv-icon green">
                <i class="ph-bold ph-scissors"></i>
              </div>
              <div class="adv-text">
                <div class="adv-title">绝育状态</div>
                <div class="adv-sub">已绝育 · 2024-06-01</div>
              </div>
              <i class="ph-bold ph-caret-right adv-arrow"></i>
            </div>
          </div>
        </div>

      </div>

      <a href="/dog_edit.html" class="edit-fab">
        <i class="ph-bold ph-pencil-simple"></i>
      </a>

    </div>
  </body>
</html>
