<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>疫苗记录 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .vaccine-page {
        padding: 16px;
        padding-bottom: 104px;
      }

      .vaccine-summary {
        background-color: var(--white);
        border-radius: 16px;
        padding: 24px;
        display: flex;
        justify-content: space-around;
        margin-bottom: 24px;
      }

      .vaccine-stat {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .vaccine-stat i {
        font-size: 24px;
        color: var(--primary-color);
        margin-bottom: 4px;
      }

      .vaccine-stat .vs-value {
        font-size: 24px;
        font-weight: 800;
        color: var(--secondary-color);
      }

      .vaccine-stat .vs-label {
        font-size: 12px;
        color: var(--text-light);
      }

      .next-reminder {
        background-color: rgba(146, 102, 153, 0.08);
        border-radius: 16px;
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .next-reminder .reminder-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background-color: rgba(146, 102, 153, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--accent-color);
        flex-shrink: 0;
      }

      .next-reminder .reminder-text {
        flex: 1;
      }

      .next-reminder .reminder-title {
        font-size: 14px;
        font-weight: 800;
        color: var(--accent-color);
        margin-bottom: 4px;
      }

      .next-reminder .reminder-desc {
        font-size: 12px;
        color: var(--text-light);
        line-height: 1.4;
      }

      .add-vaccine-btn {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 448px;
        width: calc(100% - 32px);
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="app-container">

      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/dog_profile.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">疫苗记录</div>
      </div>

      <div class="vaccine-page">

        <div class="vaccine-summary">
          <div class="vaccine-stat">
            <i class="ph-bold ph-syringe"></i>
            <span class="vs-value">3</span>
            <span class="vs-label">已接种</span>
          </div>
          <div class="vaccine-stat">
            <i class="ph-bold ph-calendar-check"></i>
            <span class="vs-value">1</span>
            <span class="vs-label">待接种</span>
          </div>
          <div class="vaccine-stat">
            <i class="ph-bold ph-bell-ringing"></i>
            <span class="vs-value">92</span>
            <span class="vs-label">天后提醒</span>
          </div>
        </div>

        <div class="next-reminder">
          <div class="reminder-icon">
            <i class="ph-bold ph-bell-ringing"></i>
          </div>
          <div class="reminder-text">
            <div class="reminder-title">下次接种提醒</div>
            <div class="reminder-desc">狂犬疫苗加强针 · 预计 2026-09-15</div>
          </div>
        </div>

        <div class="section-header" style="padding: 0; margin-bottom: 16px;">
          <h3>接种记录</h3>
        </div>

        <div class="timeline">
          <div class="timeline-item">
            <div class="timeline-dot">
              <i class="ph-bold ph-check"></i>
            </div>
            <div class="timeline-card">
              <div class="tl-title">狂犬疫苗 (第3针)</div>
              <div class="tl-date">2025-09-15 接种</div>
              <div class="tl-note">进口狂犬疫苗，有效期 1 年。接种后精神状态良好。</div>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-dot">
              <i class="ph-bold ph-check"></i>
            </div>
            <div class="timeline-card">
              <div class="tl-title">六联疫苗 (第3针)</div>
              <div class="tl-date">2025-06-01 接种</div>
              <div class="tl-note">卫佳捌六联疫苗，包含犬瘟热、细小病毒等防护。</div>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-dot">
              <i class="ph-bold ph-check"></i>
            </div>
            <div class="timeline-card">
              <div class="tl-title">体内外驱虫</div>
              <div class="tl-date">2026-05-20 接种</div>
              <div class="tl-note">拜宠清体内驱虫 + 福来恩体外驱虫，每月一次。</div>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-dot upcoming">
              <i class="ph-bold ph-clock"></i>
            </div>
            <div class="timeline-card" style="border: 2px dashed var(--accent-color);">
              <div class="tl-title" style="color: var(--accent-color);">狂犬疫苗加强针 (待接种)</div>
              <div class="tl-date">预计 2026-09-15</div>
              <div class="tl-note">距离上次接种已满 1 年，请及时补种。</div>
            </div>
          </div>
        </div>

      </div>

      <div class="add-vaccine-btn">
        <button class="btn btn-primary">
          <i class="ph-bold ph-plus" style="margin-right: 8px;"></i>
          添加疫苗记录
        </button>
      </div>

    </div>
  </body>
</html>
