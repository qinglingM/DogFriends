<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>切换狗狗 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .switch-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: rgba(0, 0, 0, 0.4);
        justify-content: flex-end;
      }

      .switch-sheet {
        background-color: var(--bg-color);
        border-radius: 24px 24px 0 0;
        padding: 16px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
        max-height: 70vh;
      }

      .switch-handle {
        width: 40px;
        height: 4px;
        background-color: var(--border-color);
        border-radius: 2px;
        margin: 0 auto 24px;
      }

      .switch-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--secondary-color);
        text-align: center;
        margin-bottom: 24px;
      }

      .switch-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 24px;
      }

      .switch-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        background-color: var(--white);
        border-radius: 16px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.2s;
        text-decoration: none;
        color: inherit;
      }

      .switch-item:active {
        border-color: var(--primary-color);
      }

      .switch-item.active {
        border-color: var(--primary-color);
        background-color: rgba(185, 207, 50, 0.08);
      }

      .switch-item .dog-avatar {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }

      .switch-item .switch-info {
        flex: 1;
      }

      .switch-item .switch-name {
        font-size: 16px;
        font-weight: 800;
        color: var(--secondary-color);
        margin-bottom: 2px;
      }

      .switch-item .switch-breed {
        font-size: 12px;
        color: var(--text-light);
      }

      .switch-item .switch-check {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .switch-item.active .switch-check {
        background-color: var(--secondary-color);
        border-color: var(--secondary-color);
        color: var(--white);
      }

      .add-dog-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 16px;
        background-color: var(--white);
        border: 2px dashed var(--border-color);
        border-radius: 16px;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        min-height: 56px;
      }

      .add-dog-btn:active {
        border-color: var(--primary-color);
      }

      .add-dog-btn i {
        font-size: 24px;
        color: var(--text-light);
      }

      .add-dog-btn span {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-light);
      }
    </style>
  </head>
  <body>
    <div class="app-container">

      <div class="switch-page">
        <div style="flex: 1;" onclick="history.back()"></div>
        <div class="switch-sheet">
          <div class="switch-handle"></div>
          <div class="switch-title">切换狗狗</div>

          <div class="switch-list">
            <a href="/walk.html" class="switch-item active">
              <div class="dog-avatar">
                <i class="ph-fill ph-dog"></i>
              </div>
              <div class="switch-info">
                <div class="switch-name">旺财</div>
                <div class="switch-breed">金毛寻回犬 · ♂ · 32kg</div>
              </div>
              <div class="switch-check">
                <i class="ph-bold ph-check" style="font-size: 14px;"></i>
              </div>
            </a>

            <a href="/walk.html" class="switch-item">
              <div class="dog-avatar">
                <i class="ph-fill ph-dog"></i>
              </div>
              <div class="switch-info">
                <div class="switch-name">小白</div>
                <div class="switch-breed">萨摩耶 · ♀ · 22kg</div>
              </div>
              <div class="switch-check"></div>
            </a>

            <a href="/walk.html" class="switch-item">
              <div class="dog-avatar">
                <i class="ph-fill ph-dog"></i>
              </div>
              <div class="switch-info">
                <div class="switch-name">豆豆</div>
                <div class="switch-breed">柯基 · ♂ · 12kg</div>
              </div>
              <div class="switch-check"></div>
            </a>
          </div>

          <a href="/dog_edit.html" class="add-dog-btn">
            <i class="ph-bold ph-plus-circle"></i>
            <span>添加新狗狗</span>
          </a>
        </div>
      </div>

    </div>
  </body>
</html>
