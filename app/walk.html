<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>遛狗 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      body {
        overflow: hidden;
      }

      .walk-page {
        width: 100%;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      .walk-page .map-placeholder {
        position: absolute;
        inset: 0;
      }

      .location-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 24px;
        height: 24px;
        z-index: 3;
      }

      .location-dot::before {
        content: '';
        position: absolute;
        inset: 0;
        background-color: var(--primary-color);
        border-radius: 50%;
        border: 3px solid var(--white);
        box-shadow: 0 2px 8px rgba(52, 112, 72, 0.3);
      }

      .location-dot::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        background-color: rgba(185, 207, 50, 0.2);
        border-radius: 50%;
      }

      .float-top {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 5;
        padding: 8px 16px;
        padding-top: calc(8px + env(safe-area-inset-top));
      }

      .week-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        background-color: var(--white);
        border-radius: 999px;
        padding: 6px 8px;
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.1);
      }

      .week-item {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 4px 0;
      }

      .week-item + .week-item {
        border-left: 1px solid var(--border-color);
      }

      .week-item i {
        font-size: 14px;
        color: var(--primary-color);
      }

      .week-item .w-val {
        font-size: 14px;
        font-weight: 800;
        color: var(--secondary-color);
      }

      .week-item .w-unit {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-light);
      }

      .recenter-btn {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 48px;
        height: 48px;
        background-color: var(--white);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--secondary-color);
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.1);
        cursor: pointer;
        z-index: 5;
      }

      .float-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 5;
        padding: 16px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .dog-multi-select {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        max-width: 100%;
      }

      .dog-multi-select::-webkit-scrollbar {
        display: none;
      }

      .dog-select-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background-color: var(--white);
        border-radius: 999px;
        padding: 6px 14px 6px 6px;
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.08);
        cursor: pointer;
        flex-shrink: 0;
        min-height: 44px;
        border: 2px solid transparent;
        transition: all 0.2s;
      }

      .dog-select-chip.selected {
        border-color: var(--primary-color);
        background-color: rgba(185, 207, 50, 0.12);
      }

      .dog-select-chip .dog-avatar {
        width: 32px;
        height: 32px;
        font-size: 16px;
        border-width: 2px;
      }

      .dog-select-chip.selected .dog-avatar {
        border-color: var(--primary-color);
      }

      .dog-select-chip .chip-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--secondary-color);
      }

      .dog-select-chip .chip-check {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
      }

      .dog-select-chip.selected .chip-check {
        background-color: var(--secondary-color);
        border-color: var(--secondary-color);
      }

      .dog-select-chip.selected .chip-check i {
        color: var(--white);
        font-size: 12px;
      }

      .dog-select-chip.unselected .chip-check {
        background-color: transparent;
      }

      .dog-add-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background-color: var(--white);
        border: 2px dashed var(--border-color);
        border-radius: 50%;
        cursor: pointer;
        flex-shrink: 0;
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.08);
        transition: border-color 0.2s;
      }

      .dog-add-chip:active {
        border-color: var(--primary-color);
      }

      .dog-add-chip i {
        font-size: 20px;
        color: var(--text-light);
      }

      .start-walk-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: var(--primary-color);
        color: var(--secondary-color);
        border: none;
        border-radius: 999px;
        padding: 14px 48px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        border-bottom: 3px solid var(--secondary-color);
        text-decoration: none;
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.15);
        min-height: 48px;
      }

      .start-walk-btn:active {
        opacity: 0.85;
      }

      .start-walk-btn i {
        font-size: 20px;
      }

      .bottom-tab-float {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 6;
      }
    </style>
  </head>
  <body>
    <div class="walk-page">

      <div class="map-placeholder">
        <i class="ph-bold ph-map-trifold"></i>
        <span style="font-weight: 700; font-size: 14px;">高德地图 · 全屏区域</span>
        <span style="font-size: 12px;">集成 Amap JS API 2.0 后替换</span>
      </div>

      <div class="location-dot"></div>

      <div class="float-top">
        <div class="week-bar">
          <div class="week-item">
            <i class="ph-bold ph-paw-print"></i>
            <span class="w-val">5</span>
            <span class="w-unit">次</span>
          </div>
          <div class="week-item">
            <i class="ph-bold ph-path"></i>
            <span class="w-val">12.6</span>
            <span class="w-unit">km</span>
          </div>
          <div class="week-item">
            <i class="ph-bold ph-timer"></i>
            <span class="w-val">3.5</span>
            <span class="w-unit">h</span>
          </div>
        </div>
      </div>

      <div class="recenter-btn">
        <i class="ph-bold ph-crosshair"></i>
      </div>

      <div class="float-bottom">

        <div class="dog-multi-select">
          <div class="dog-select-chip selected" onclick="toggleDog(this)">
            <div class="dog-avatar">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span class="chip-name">旺财</span>
            <div class="chip-check">
              <i class="ph-bold ph-check"></i>
            </div>
          </div>
          <div class="dog-select-chip selected" onclick="toggleDog(this)">
            <div class="dog-avatar">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span class="chip-name">小白</span>
            <div class="chip-check">
              <i class="ph-bold ph-check"></i>
            </div>
          </div>
          <div class="dog-select-chip unselected" onclick="toggleDog(this)">
            <div class="dog-avatar">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span class="chip-name">豆豆</span>
            <div class="chip-check"></div>
          </div>
          <div class="dog-add-chip" onclick="location.href='/dog_edit.html'">
            <i class="ph-bold ph-plus"></i>
          </div>
        </div>

        <a href="/walk_tracking.html" class="start-walk-btn">
          <i class="ph-fill ph-play"></i>
          开始遛狗
        </a>

      </div>

      <div class="bottom-tab bottom-tab-float" style="background-color: rgba(255,255,255,0.92); backdrop-filter: blur(12px);">
        <a href="/walk.html" class="tab-item active">
          <i class="ph-fill ph-map-pin-line"></i>
          <span>遛狗</span>
        </a>
        <a href="/square.html" class="tab-item">
          <i class="ph-bold ph-compass-tool"></i>
          <span>广场</span>
        </a>
        <a href="/index.html" class="tab-item">
          <i class="ph-bold ph-paw-print"></i>
          <span>去玩</span>
        </a>
        <a href="/profile.html" class="tab-item">
          <i class="ph-bold ph-user"></i>
          <span>我的</span>
        </a>
      </div>

    </div>

    <script>
      function toggleDog(el) {
        var isSelected = el.classList.contains('selected');
        if (isSelected) {
          el.classList.remove('selected');
          el.classList.add('unselected');
          var check = el.querySelector('.chip-check');
          check.innerHTML = '';
        } else {
          el.classList.remove('unselected');
          el.classList.add('selected');
          var check = el.querySelector('.chip-check');
          check.innerHTML = '<i class="ph-bold ph-check"></i>';
        }
      }
    </script>

  </body>
</html>
