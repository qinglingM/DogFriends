<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>设置 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .settings-page {
        padding: 16px;
        padding-bottom: 48px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .settings-group-label {
        font-size: 12px;
        font-weight: 800;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 0 4px;
      }

      .version-info {
        text-align: center;
        padding: 32px 0;
        color: var(--text-light);
        font-size: 12px;
      }

      .version-info .app-logo {
        font-size: 32px;
        color: var(--primary-color);
        margin-bottom: 8px;
      }

      .version-info .app-name {
        font-size: 16px;
        font-weight: 800;
        color: var(--secondary-color);
        margin-bottom: 4px;
      }

      .logout-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background-color: var(--white);
        border-radius: 16px;
        font-size: 16px;
        font-weight: 700;
        color: #E74C3C;
        cursor: pointer;
        border: none;
        width: 100%;
        min-height: 56px;
      }

      .logout-btn:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="app-container">

      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/profile.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">设置</div>
      </div>

      <div class="settings-page">

        <span class="settings-group-label">账号</span>
        <div class="menu-list">
          <a href="#" class="menu-item">
            <div class="menu-icon green">
              <i class="ph-bold ph-user-circle"></i>
            </div>
            <span class="menu-text">个人信息</span>
            <i class="ph-bold ph-caret-right menu-arrow"></i>
          </a>
          <a href="#" class="menu-item">
            <div class="menu-icon green">
              <i class="ph-bold ph-shield-check"></i>
            </div>
            <span class="menu-text">隐私设置</span>
            <i class="ph-bold ph-caret-right menu-arrow"></i>
          </a>
        </div>

        <span class="settings-group-label">通知</span>
        <div class="menu-list">
          <div class="menu-item">
            <div class="menu-icon purple">
              <i class="ph-bold ph-bell"></i>
            </div>
            <span class="menu-text">审核通知</span>
            <div class="toggle-switch" style="width: 48px; height: 28px; background-color: var(--primary-color); border-radius: 14px; position: relative; flex-shrink: 0;">
              <div class="toggle-knob" style="width: 24px; height: 24px; background-color: white; border-radius: 50%; position: absolute; top: 2px; right: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.15);"></div>
            </div>
          </div>
          <div class="menu-item">
            <div class="menu-icon purple">
              <i class="ph-bold ph-syringe"></i>
            </div>
            <span class="menu-text">疫苗提醒</span>
            <div class="toggle-switch" style="width: 48px; height: 28px; background-color: var(--primary-color); border-radius: 14px; position: relative; flex-shrink: 0;">
              <div class="toggle-knob" style="width: 24px; height: 24px; background-color: white; border-radius: 50%; position: absolute; top: 2px; right: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.15);"></div>
            </div>
          </div>
          <div class="menu-item">
            <div class="menu-icon purple">
              <i class="ph-bold ph-heart"></i>
            </div>
            <span class="menu-text">互动消息</span>
            <div class="toggle-switch off" style="width: 48px; height: 28px; background-color: var(--border-color); border-radius: 14px; position: relative; flex-shrink: 0;">
              <div class="toggle-knob" style="width: 24px; height: 24px; background-color: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.15);"></div>
            </div>
          </div>
        </div>

        <span class="settings-group-label">其他</span>
        <div class="menu-list">
          <a href="#" class="menu-item">
            <div class="menu-icon green">
              <i class="ph-bold ph-question"></i>
            </div>
            <span class="menu-text">帮助与反馈</span>
            <i class="ph-bold ph-caret-right menu-arrow"></i>
          </a>
          <a href="#" class="menu-item">
            <div class="menu-icon green">
              <i class="ph-bold ph-info"></i>
            </div>
            <span class="menu-text">关于狗友</span>
            <i class="ph-bold ph-caret-right menu-arrow"></i>
          </a>
        </div>

        <button class="logout-btn">退出登录</button>

        <div class="version-info">
          <div class="app-logo"><i class="ph-fill ph-paw-print"></i></div>
          <div class="app-name">狗友</div>
          <div>版本 1.0.0</div>
        </div>

      </div>

    </div>
  </body>
</html>
