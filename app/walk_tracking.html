<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>遛狗中 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      body {
        overflow: hidden;
      }

      .tracking-page {
        width: 100%;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      .tracking-page .map-placeholder {
        position: absolute;
        inset: 0;
      }

      .tracking-top {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 5;
        padding: 16px;
        padding-top: calc(16px + env(safe-area-inset-top));
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .tracking-dog-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background-color: var(--white);
        border-radius: 999px;
        padding: 8px 16px 8px 8px;
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.08);
        min-height: 48px;
      }

      .tracking-dog-pill .dog-avatar {
        width: 32px;
        height: 32px;
        font-size: 16px;
        border-width: 2px;
      }

      .tracking-dog-pill .dog-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--secondary-color);
      }

      .tracking-status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background-color: var(--primary-color);
        border-radius: 999px;
        padding: 8px 16px;
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.08);
        min-height: 48px;
      }

      .tracking-status-pill .pulse-dot {
        width: 8px;
        height: 8px;
        background-color: var(--secondary-color);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .tracking-status-pill span {
        font-size: 14px;
        font-weight: 800;
        color: var(--secondary-color);
      }

      .tracking-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3;
      }

      .location-dot-live {
        width: 24px;
        height: 24px;
        position: relative;
      }

      .location-dot-live::before {
        content: '';
        position: absolute;
        inset: 0;
        background-color: var(--primary-color);
        border-radius: 50%;
        border: 3px solid var(--white);
        box-shadow: 0 2px 8px rgba(52, 112, 72, 0.3);
      }

      .location-dot-live::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 56px;
        height: 56px;
        background-color: rgba(185, 207, 50, 0.15);
        border-radius: 50%;
        animation: pulse-ring 2s infinite;
      }

      @keyframes pulse-ring {
        0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
      }

      .tracking-timer-bar {
        position: absolute;
        top: calc(80px + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .timer-display {
        background-color: var(--white);
        border-radius: 16px;
        padding: 12px 32px;
        box-shadow: 0 4px 24px rgba(52, 112, 72, 0.1);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .timer-display .time {
        font-size: 36px;
        font-weight: 800;
        color: var(--secondary-color);
        font-variant-numeric: tabular-nums;
        letter-spacing: 1px;
      }

      .timer-display i {
        font-size: 20px;
        color: var(--primary-color);
      }

      .tracking-stats-row {
        display: flex;
        gap: 8px;
      }

      .tracking-stat-pill {
        background-color: var(--white);
        border-radius: 999px;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 700;
        color: var(--secondary-color);
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.08);
      }

      .tracking-stat-pill i {
        font-size: 16px;
        color: var(--primary-color);
      }

      .tracking-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 5;
        padding: 24px 16px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .tracking-photo-btn {
        position: absolute;
        right: 16px;
        bottom: 120px;
        width: 56px;
        height: 56px;
        background-color: var(--white);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--secondary-color);
        box-shadow: 0 4px 16px rgba(52, 112, 72, 0.1);
        cursor: pointer;
        z-index: 5;
        border: 2px solid var(--secondary-color);
      }

      .tracking-photo-btn:active {
        opacity: 0.8;
      }

      .photo-count-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        width: 20px;
        height: 20px;
        background-color: var(--primary-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 800;
        color: var(--secondary-color);
        border: 2px solid var(--white);
      }

      .photo-strip {
        position: absolute;
        right: 16px;
        bottom: 192px;
        z-index: 5;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 200px;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .photo-strip::-webkit-scrollbar {
        display: none;
      }

      .photo-strip-thumb {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        background-color: #D3E0C8;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        position: relative;
        flex-shrink: 0;
        border: 2px solid var(--white);
      }

      .photo-strip-thumb i {
        font-size: 16px;
        color: var(--secondary-color);
        opacity: 0.6;
      }

      .photo-strip-thumb .thumb-time {
        position: absolute;
        bottom: -2px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 8px;
        color: var(--white);
        background-color: rgba(0,0,0,0.5);
        padding: 1px 3px;
        border-radius: 2px;
        white-space: nowrap;
      }

      .tracking-controls {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .control-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .control-btn .btn-circle {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        border: 2px solid var(--secondary-color);
      }

      .control-btn .btn-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--white);
        text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      }

      .control-btn.pause .btn-circle {
        background-color: var(--white);
        color: var(--secondary-color);
      }

      .control-btn.stop .btn-circle {
        background-color: #E74C3C;
        color: var(--white);
        border-color: #C0392B;
        width: 72px;
        height: 72px;
        font-size: 32px;
      }

      .control-btn.resume .btn-circle {
        background-color: var(--primary-color);
        color: var(--secondary-color);
      }
    </style>
  </head>
  <body>
    <div class="tracking-page">

      <div class="map-placeholder">
        <i class="ph-bold ph-map-trifold"></i>
        <span style="font-weight: 700; font-size: 14px;">实时轨迹绘制区域</span>
        <span style="font-size: 12px;">GPS 坐标连续打点 → 折线绘制</span>
      </div>

      <div class="tracking-center">
        <div class="location-dot-live"></div>
      </div>

      <div class="tracking-top">
        <div style="display: flex; gap: 8px;">
          <div class="tracking-dog-pill">
            <div class="dog-avatar">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span class="dog-name">旺财</span>
          </div>
          <div class="tracking-dog-pill">
            <div class="dog-avatar">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span class="dog-name">小白</span>
          </div>
        </div>
        <div class="tracking-status-pill">
          <div class="pulse-dot"></div>
          <span>遛狗中</span>
        </div>
      </div>

      <div class="tracking-timer-bar">
        <div class="timer-display">
          <i class="ph-bold ph-timer"></i>
          <span class="time">00:23:45</span>
        </div>
        <div class="tracking-stats-row">
          <div class="tracking-stat-pill">
            <i class="ph-bold ph-path"></i>
            <span>1.8 km</span>
          </div>
          <div class="tracking-stat-pill">
            <i class="ph-bold ph-gauge"></i>
            <span>4.6 km/h</span>
          </div>
        </div>
      </div>

      <div class="photo-strip">
        <div class="photo-strip-thumb">
          <i class="ph-bold ph-image"></i>
          <span class="thumb-time">10:23</span>
        </div>
        <div class="photo-strip-thumb">
          <i class="ph-bold ph-image"></i>
          <span class="thumb-time">10:41</span>
        </div>
      </div>

      <div class="tracking-photo-btn">
        <i class="ph-bold ph-camera"></i>
        <div class="photo-count-badge">2</div>
      </div>

      <div class="tracking-bottom">
        <div class="tracking-controls">
          <div class="control-btn pause">
            <div class="btn-circle">
              <i class="ph-bold ph-pause"></i>
            </div>
            <span class="btn-label">暂停</span>
          </div>
          <a href="/walk_summary.html" class="control-btn stop" style="text-decoration: none;">
            <div class="btn-circle">
              <i class="ph-bold ph-square"></i>
            </div>
            <span class="btn-label">结束</span>
          </a>
        </div>
      </div>

    </div>
  </body>
</html>
