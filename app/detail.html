<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>地点详情 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      /* Detail Page specific styles conforming to 8pt Grid */
      .hero-image {
        height: 240px; /* Multiple of 8 */
        width: 100%;
        position: relative;
      }
      .back-btn {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 48px; /* Standard 48px touch target */
        height: 48px;
        background-color: var(--white);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--secondary-color);
        box-shadow: 0 4px 16px rgba(0,0,0,0.05); /* Softer shadow */
        z-index: 10;
      }
      .detail-content {
        padding: 24px 16px; /* Standard edges, more top room */
        background-color: var(--bg-color);
        border-radius: 24px 24px 0 0;
        margin-top: -24px;
        position: relative;
        z-index: 5;
        flex-grow: 1;
      }
      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      .title-row h1 {
        font-size: 24px;
      }
      .action-icons {
        display: flex;
        gap: 16px;
        color: var(--secondary-color);
        font-size: 24px;
        width: 48px;
        height: 48px;
        align-items: center;
        justify-content: flex-end;
      }
      .address-row {
        color: var(--text-light);
        font-size: 14px;
        margin-bottom: 24px; /* 8pt grid */
        display: flex;
        align-items: center;
        gap: 8px; /* 8pt grid */
      }
      
      .section-title {
        font-size: 18px;
        margin-bottom: 16px;
        margin-top: 24px;
      }

      .status-banner {
        background-color: var(--primary-color);
        padding: 16px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        border-bottom: 4px solid var(--secondary-color); /* Chunky */
      }
      
      .rules-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px; /* 8px tight gap */
        margin-bottom: 24px;
      }
      .rule-item {
        background-color: var(--white);
        padding: 16px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        color: var(--secondary-color);
      }
      
      .facility-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .bottom-action {
        position: sticky;
        bottom: 0;
        padding: 16px;
        background-color: var(--bg-color);
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      
      <div class="hero-image">
        <a href="/index.html" class="back-btn"><i class="ph-bold ph-arrow-left"></i></a>
        <div class="placeholder-img" style="border-radius: 0; background-color: #D3E0C8;">
          <i class="ph-bold ph-image" style="font-size: 64px; color: var(--secondary-color); opacity: 0.3;"></i>
        </div>
      </div>

      <div class="detail-content">
        <div class="title-row">
          <h1>BLOOM Coffee</h1>
          <div class="action-icons">
            <i class="ph-bold ph-bookmark-simple"></i>
          </div>
        </div>
        <div class="address-row">
          <i class="ph-fill ph-map-pin"></i> 咖啡店 · 徐汇区某某路 123 号
        </div>

        <div class="status-banner">
          <i class="ph-fill ph-check-circle" style="font-size: 32px; color: var(--secondary-color);"></i>
          <div>
            <div style="font-weight: 800; color: var(--secondary-color); font-size: 16px;">已验证可带狗</div>
            <div style="font-size: 12px; color: var(--secondary-color); opacity: 0.8; margin-top: 4px;">2 天前有用户去过</div>
          </div>
        </div>

        <h3 class="section-title">宠物规则</h3>
        <div class="rules-grid">
          <div class="rule-item"><i class="ph-bold ph-house"></i> 仅户外可进</div>
          <div class="rule-item"><i class="ph-bold ph-dog"></i> 小型犬友好</div>
        </div>

        <h3 class="section-title">设施与要求</h3>
        <div class="facility-tags">
          <span class="chip chip-default">有水碗</span>
          <span class="chip chip-default">需要牵绳</span>
          <span class="chip chip-default">不能上椅</span>
        </div>
      </div>

      <div class="bottom-action">
        <a href="/add_method.html" class="btn btn-secondary" style="margin-bottom: 16px;">我去过，更新信息</a>
        <div style="display: flex; gap: 16px;">
          <button class="btn btn-primary" style="flex: 1;"><i class="ph-bold ph-navigation-arrow" style="margin-right: 8px;"></i> 导航</button>
          <button class="btn btn-primary" style="flex: 1; background-color: var(--white);"><i class="ph-bold ph-phone" style="margin-right: 8px;"></i> 电话</button>
        </div>
      </div>

    </div>
  </body>
</html>
