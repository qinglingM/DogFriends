<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>宠物友好规则 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .step-indicator { font-weight: 800; color: var(--text-light); font-size: 14px; }

      .progress-bar { height: 8px; background-color: var(--border-color); margin: 0 16px 24px; border-radius: 4px; overflow: hidden; }
      .progress-inner { height: 100%; width: 66.66%; background-color: var(--primary-color); border-radius: 4px; }

      .form-container { padding: 0 16px 104px; }
      .form-group { margin-bottom: 24px; }
      .form-label { display: block; font-weight: 800; margin-bottom: 12px; font-size: 16px; }
      .form-label span { color: #E74C3C; }

      .options-list { display: flex; flex-direction: column; gap: 8px; }
      .option-row {
        background-color: var(--white); padding: 16px; border-radius: 16px;
        display: flex; justify-content: space-between; align-items: center;
        font-weight: 700; border: 2px solid transparent;
      }
      .option-row.active { background-color: rgba(185, 207, 50, 0.2); border-color: var(--primary-color); color: var(--secondary-color); }
      .check-icon {
        width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border-color);
        display: flex; align-items: center; justify-content: center; color: white;
      }
      .option-row.active .check-icon { background-color: var(--secondary-color); border-color: var(--secondary-color); }

      .multi-options { display: flex; flex-wrap: wrap; gap: 8px; }
      .multi-chip { background-color: var(--white); padding: 12px 16px; border-radius: 999px; font-weight: 700; border: 2px solid transparent; }
      .multi-chip.active { background-color: var(--primary-color); border-color: var(--secondary-color); color: var(--secondary-color); }

      .bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
        padding: 16px; background-color: var(--bg-color); border-top: 1px solid var(--border-color);
        display: flex; gap: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/add_basic.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">新增地点 · 规则</div>
        <div class="nav-actions right">
          <div class="step-indicator">2/3</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-inner"></div></div>

      <div class="form-container">
        
        <div class="form-group">
          <label class="form-label">宠物可进入区域 <span>*</span></label>
          <div class="options-list">
            <div class="option-row active">
              <span>室内可进</span>
              <div class="check-icon"><i class="ph-bold ph-check" style="font-size: 14px;"></i></div>
            </div>
            <div class="option-row">
              <span>室外可进 / 仅露台</span>
              <div class="check-icon"></div>
            </div>
            <div class="option-row">
              <span>不可进入 (纠错)</span>
              <div class="check-icon"></div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">适合的狗狗 <span>*</span></label>
          <div class="multi-options">
            <div class="multi-chip active">小型犬友好</div>
            <div class="multi-chip active">中型犬友好</div>
            <div class="multi-chip">大型犬友好</div>
            <div class="multi-chip">所有体型</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">行为要求 (选填)</label>
          <div class="multi-options">
            <div class="multi-chip active">需要牵绳</div>
            <div class="multi-chip">需要嘴套</div>
            <div class="multi-chip active">不能上椅/沙发</div>
            <div class="multi-chip">不能吠叫</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">配套设施 (选填)</label>
          <div class="multi-options">
            <div class="multi-chip active">有水碗</div>
            <div class="multi-chip">有宠物餐</div>
            <div class="multi-chip">有便袋</div>
            <div class="multi-chip">有草坪</div>
            <div class="multi-chip">其他</div>
          </div>
        </div>

      </div>

      <div class="bottom-bar">
        <a href="/add_basic.html" class="btn btn-secondary" style="flex: 1;">上一步</a>
        <a href="/add_images.html" class="btn btn-primary" style="flex: 2;">下一步</a>
      </div>
    </div>
  </body>
</html>
