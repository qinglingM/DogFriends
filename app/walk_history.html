<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>遛狗历史 - 狗友</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .history-page {
        padding: 16px;
        padding-bottom: 48px;
      }

      .month-selector {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        margin-bottom: 24px;
      }

      .month-selector .month-arrow {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: var(--text-light);
        cursor: pointer;
        border-radius: 50%;
      }

      .month-selector .month-arrow:active {
        background-color: var(--white);
      }

      .month-selector .month-text {
        font-size: 18px;
        font-weight: 800;
        color: var(--secondary-color);
      }
    </style>
  </head>
  <body>
    <div class="app-container">

      <div class="nav-bar" style="background-color: var(--bg-color);">
        <div class="nav-actions left">
          <a href="/profile.html" style="display:flex;"><i class="ph-bold ph-arrow-left"></i></a>
        </div>
        <div class="nav-title">遛狗历史</div>
      </div>

      <div class="history-page">

        <div class="month-selector">
          <div class="month-arrow"><i class="ph-bold ph-caret-left"></i></div>
          <span class="month-text">2026 年 6 月</span>
          <div class="month-arrow"><i class="ph-bold ph-caret-right"></i></div>
        </div>

        <div class="month-overview">
          <div class="month-stat">
            <span class="month-value">18</span>
            <span class="month-unit">次</span>
            <span class="month-label">本月遛狗</span>
          </div>
          <div class="month-stat">
            <span class="month-value">48.2</span>
            <span class="month-unit">km</span>
            <span class="month-label">本月距离</span>
          </div>
          <div class="month-stat">
            <span class="month-value">14.5</span>
            <span class="month-unit">h</span>
            <span class="month-label">本月时长</span>
          </div>
        </div>

        <div class="date-group">今天 · 6月7日</div>

        <a href="/walk_detail.html" class="walk-record" style="text-decoration: none; color: inherit;">
          <div class="walk-record-header">
            <span class="walk-record-date">08:30 - 09:15</span>
            <span class="chip chip-verified" style="font-size: 10px; padding: 4px 8px;">已完成</span>
          </div>
          <div class="walk-record-stats">
            <span><i class="ph-bold ph-path"></i> 3.2 km</span>
            <span><i class="ph-bold ph-timer"></i> 45 min</span>
            <span><i class="ph-bold ph-gauge"></i> 4.3 km/h</span>
          </div>
          <div class="walk-record-dog">
            <div class="dog-avatar" style="width: 24px; height: 24px; font-size: 12px;">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span>旺财</span>
          </div>
        </a>

        <div class="date-group">昨天 · 6月6日</div>

        <a href="/walk_detail.html" class="walk-record" style="text-decoration: none; color: inherit;">
          <div class="walk-record-header">
            <span class="walk-record-date">18:00 - 18:40</span>
            <span class="chip chip-verified" style="font-size: 10px; padding: 4px 8px;">已完成</span>
          </div>
          <div class="walk-record-stats">
            <span><i class="ph-bold ph-path"></i> 2.8 km</span>
            <span><i class="ph-bold ph-timer"></i> 40 min</span>
            <span><i class="ph-bold ph-gauge"></i> 4.2 km/h</span>
          </div>
          <div class="walk-record-dog">
            <div class="dog-avatar" style="width: 24px; height: 24px; font-size: 12px;">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span>旺财 · 小白</span>
          </div>
        </a>

        <a href="/walk_detail.html" class="walk-record" style="text-decoration: none; color: inherit;">
          <div class="walk-record-header">
            <span class="walk-record-date">07:15 - 07:45</span>
            <span class="chip chip-verified" style="font-size: 10px; padding: 4px 8px;">已完成</span>
          </div>
          <div class="walk-record-stats">
            <span><i class="ph-bold ph-path"></i> 1.5 km</span>
            <span><i class="ph-bold ph-timer"></i> 30 min</span>
            <span><i class="ph-bold ph-gauge"></i> 3.0 km/h</span>
          </div>
          <div class="walk-record-dog">
            <div class="dog-avatar" style="width: 24px; height: 24px; font-size: 12px;">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span>小白</span>
          </div>
        </a>

        <div class="date-group">6月5日</div>

        <a href="/walk_detail.html" class="walk-record" style="text-decoration: none; color: inherit;">
          <div class="walk-record-header">
            <span class="walk-record-date">19:00 - 19:55</span>
            <span class="chip chip-verified" style="font-size: 10px; padding: 4px 8px;">已完成</span>
          </div>
          <div class="walk-record-stats">
            <span><i class="ph-bold ph-path"></i> 4.1 km</span>
            <span><i class="ph-bold ph-timer"></i> 55 min</span>
            <span><i class="ph-bold ph-gauge"></i> 4.5 km/h</span>
          </div>
          <div class="walk-record-dog">
            <div class="dog-avatar" style="width: 24px; height: 24px; font-size: 12px;">
              <i class="ph-fill ph-dog"></i>
            </div>
            <span>旺财</span>
          </div>
        </a>

      </div>

    </div>
  </body>
</html>
